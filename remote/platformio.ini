; ========================================================
;  X68-Stackchan リモコン送信機ファーム (StickC-Plus + Hat Mini JoyC)
;
; ビルド:
;   pio run -e m5stick-c-plus
; プログラム書込:
;   pio run -e m5stick-c-plus -t upload
; シリアル監視:
;   pio device monitor -e m5stick-c-plus
;
; 事前に include/config.h を作成すること
;   cp include/config.h.example include/config.h
; ========================================================

[platformio]
default_envs = m5stick-c-plus

[env:m5stick-c-plus]
platform   = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board      = m5stick-c
framework  = arduino
board_build.variant = m5stack_stickc_plus

monitor_speed = 115200
upload_speed  = 1500000

build_unflags =
    -std=gnu++11
    -DARDUINO_M5Stick_C

build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_M5STICK_C_PLUS

lib_deps =
    m5stack/M5Unified @ ^0.2.0
