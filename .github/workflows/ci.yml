name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-checks:
    runs-on: ubuntu-latest
    name: server (lint + py_compile + pytest)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimum runtime + test deps
        # 母艦の重い依存 (torch / faster-whisper / Irodori) は除外。
        # サーバの純粋ロジック (queue / scheduler / fastapi endpoints) を回せる分だけ。
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi==0.115.0 \
            "uvicorn[standard]==0.30.6" \
            python-multipart==0.0.9 \
            pydantic-settings==2.5.2 \
            httpx==0.27.2 \
            "croniter>=2.0" \
            python-dotenv==1.0.1 \
            pytest==8.3.3 \
            pytest-asyncio==0.24.0 \
            ruff==0.6.9

      - name: py_compile (syntax sanity)
        # import は実行せず、.pyc も書かずに server 配下の Python 構文だけを確認する。
        run: |
          python - <<'PY'
          from pathlib import Path

          for path in sorted(Path("server").rglob("*.py")):
              compile(path.read_text(encoding="utf-8"), str(path), "exec")
          PY

      - name: ruff (lint)
        run: ruff check server/ --select E,F,W,I --ignore E501

      - name: pytest
        run: pytest server/tests/ -v

  firmware-headers:
    runs-on: ubuntu-latest
    name: firmware (header smoke check)
    steps:
      - uses: actions/checkout@v4

      - name: Verify config.h.example renders to valid C++
        # 完全ビルドは PlatformIO の Docker で時間がかかるので、
        # ヘッダだけ最低限プリプロセッサにかけて構文崩れがないか確認
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++
          cat > /tmp/config_check.cpp <<'EOF'
          #include <cstdint>
          #include "config.h.example"
          EOF
          # 単に C++ コンパイラに通せれば OK (リンクはしない)
          g++ -fsyntax-only -std=gnu++17 -x c++ \
            -DARDUINO=10800 \
            -Ifirmware/include \
            /tmp/config_check.cpp
          # 必須設定が全部定義されているか確認
          grep -q "SERVER_HOST" firmware/include/config.h.example
          grep -q "SERVER_PORT" firmware/include/config.h.example
          grep -q "SERVO_ENABLED" firmware/include/config.h.example
          grep -q "WiFiManager" firmware/include/wifi_manager.h
          grep -q "wifiReady" firmware/include/http_client.h
