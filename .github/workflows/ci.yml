name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-checks:
    runs-on: ubuntu-latest
    name: server (lint + py_compile + pytest)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimum runtime + test deps
        # 母艦の重い依存 (torch / faster-whisper / Irodori) は除外。
        # サーバの純粋ロジック (queue / scheduler / fastapi endpoints) を回せる分だけ。
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi==0.115.0 \
            "uvicorn[standard]==0.30.6" \
            python-multipart==0.0.9 \
            pydantic-settings==2.5.2 \
            httpx==0.27.2 \
            "croniter>=2.0" \
            python-dotenv==1.0.1 \
            pytest==8.3.3 \
            pytest-asyncio==0.24.0 \
            ruff==0.6.9

      - name: py_compile (syntax sanity)
        # CUDA / Whisper を import するモジュール (main.py / stt.py / tts_irodori.py)
        # は CI 環境では import 不可能なので、まず構文だけ確認する
        run: |
          python -m py_compile \
            server/utterance_queue.py \
            server/scheduler.py \
            server/persona.py

      - name: ruff (lint)
        run: ruff check server/ --select E,F,W,I --ignore E501

      - name: pytest
        run: pytest server/tests/ -v

  firmware-headers:
    runs-on: ubuntu-latest
    name: firmware (header smoke check)
    steps:
      - uses: actions/checkout@v4

      - name: Verify config.h.example renders to valid C++
        # 完全ビルドは PlatformIO の Docker で時間がかかるので、
        # ヘッダだけ最低限プリプロセッサにかけて構文崩れがないか確認
        run: |
          cp firmware/include/config.h.example firmware/include/config.h
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++
          # 単に C++ プリプロセッサに通せれば OK (リンクはしない)
          g++ -fsyntax-only -std=gnu++17 -x c++ \
            -DARDUINO=10800 \
            -Wno-everything \
            firmware/include/config.h 2>&1 | tail -20 || true
          # SERVER_HOST / SERVER_PORT / SERVO_ENABLED 定数が定義されているか確認
          grep -E "SERVER_HOST|SERVER_PORT|SERVO_ENABLED" firmware/include/config.h
