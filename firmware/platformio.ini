; ========================================================
;  X68-Stackchan (ぺけ子ちゃん版) CoreS3 SE ファーム
; ========================================================
; ビルド:
;   pio run -e m5stack-cores3
; プログラム書込:
;   pio run -e m5stack-cores3 -t upload
; LittleFS イメージ書込 (data/ の中身を焼く - face_01.jpg ... face_36.jpg のみ置く):
;   pio run -e m5stack-cores3 -t buildfs
;   pio run -e m5stack-cores3 -t uploadfs
; シリアル監視:
;   pio device monitor -e m5stack-cores3
;
; 事前に include/config.h を作成すること
;   cp include/config.h.example include/config.h
; ========================================================

[platformio]
default_envs = m5stack-cores3

[env:m5stack-cores3]
; PlatformIO 公式 espressif32 6.x は arduino-esp32 v3.x との SDK 同梱が
; 不完全 (soc/soc.h などが落ちる) なので pioarduino フォークに切り替え。
; M5Stack コミュニティ標準。タグは Arduino v3.3.x / IDF v5.5.x。
platform   = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board      = m5stack-cores3
framework  = arduino

; ESP32-S3 16MB Flash, 8MB PSRAM
; OTA は使わない方針で、app 6MB + LittleFS 10MB の自前パーティション
board_build.partitions       = partitions_pekeko.csv
board_build.filesystem       = littlefs
board_build.f_flash          = 80000000L
board_upload.flash_size      = 16MB
board_build.psram_type       = opi
; Arduino-ESP32 v3.x (IDF 5.x) は esp32s3 用に dio_opi / dio_qspi の sdkconfig
; しか同梱しない。board JSON のデフォルト qio だと sdkconfig.h が見つからず
; ビルドできないので dio を明示する。実行時動作には影響しない (eFuse 側で QIO)。
board_build.flash_mode       = dio

monitor_speed  = 115200
upload_speed   = 1500000

build_unflags =
    -std=gnu++11

build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    m5stack/M5Unified @ ^0.2.0
    bblanchon/ArduinoJson @ ^7.0.0
    fastled/FastLED @ ^3.7.0
    ; 公式 StackChan 拡張 (I/O expander + RGB + 頭頂 Si12T タッチセンサー)
    https://github.com/m5stack/StackChan-BSP.git
